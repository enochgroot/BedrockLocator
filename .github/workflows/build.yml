name: Build BedrockLocator
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: "21", distribution: "temurin"}
      - uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew --no-build-cache build 2>&1 | tee build_output.txt || true
      - name: Push build log to repo
        run: |
          git config user.email 'action@github.com'
          git config user.name 'GitHub Action'
          git add build_output.txt
          git commit -m 'ci: build log' || true
          git push || true
      - name: Check and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JAR=$(ls build/libs/BedrockLocator-*.jar 2>/dev/null | grep -v sources | grep -v dev | head -1)
          if [ -n "$JAR" ]; then
            gh release delete v1.0.0 --yes 2>/dev/null || true
            gh release create v1.0.0 "$JAR" --title 'BedrockLocator v1.0.0' --notes 'Bedrock coord finder'
          else
            echo 'Build failed'; exit 1
          fi
